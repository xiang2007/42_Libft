name: Libft_CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout the code
              uses: actions/checkout@v7

            - name: run make
              run: make
            
            - name: Norminette
              uses: 42School/norminette@3.3.59
              with:
                args: src/ bonus/ includes/ '-RCheckForbiddenSourceHeader'